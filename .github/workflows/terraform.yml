name: Terraform CI
on: [pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, prod]  # Parallel validation
    steps:
    - uses: actions/checkout@v4
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.14.4
    - run: |
        cd terraform/environments/${{ matrix.env }}
        terraform init \
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
          -backend-config="key=environments/${{ matrix.env }}/terraform.tfstate"
    - run: |
        cd terraform/environments/${{ matrix.env }}
        terraform validate
        terraform plan -var-file="terraform.tfvars"
  ansible:
    needs: validate
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install ansible-lint
      run: pip install ansible-lint
    # The inventory is generated by `terraform apply`, so PR checks lint the
    # playbooks rather than run them against (non-existent) hosts.
    - name: Lint Ansible Playbooks
      working-directory: ansible
      run: |
        ansible-lint site.yml
        ansible-lint site-nginx.yml